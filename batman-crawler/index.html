<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Batman Crawler</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="sky" aria-hidden="true"></div>
    <div class="city" aria-hidden="true"></div>
    <p class="hint">Click Batman to throw batarangs · Press F for fullscreen</p>

    <button id="batman" class="batman" type="button" aria-label="Batman — click to throw batarangs">
      <img id="batman-sprite" alt="" draggable="false" />
    </button>

    <div id="projectiles" class="projectiles" aria-hidden="true"></div>

    <script src="app.js"></script>
  </body>
</html>
